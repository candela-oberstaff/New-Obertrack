# Local development overrides (NOT for production).
# docker compose automatically merges this file on top of docker-compose.yaml.
# It re-publishes the backend on 8081 so the Vite dev proxy (localhost:5173 ->
# localhost:8081) works, and runs it in debug mode so auth cookies are not
# marked Secure (which lets them work over plain http during local dev).
services:
  backend:
    ports:
      - "8081:8080"
    environment:
      GIN_MODE: debug

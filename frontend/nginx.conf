# ─── Obertrack frontend / reverse proxy ──────────────────────────────────────
# Security headers and hardening per audit finding A-01.
#
# TLS: terminate HTTPS here in production. A ready-to-use 443 server block is
# provided below (commented) — mount your certs and uncomment it, then keep the
# port-80 block only to redirect to HTTPS.

server {
    listen 8080;                           # unprivileged Nginx (non-root, audit A-02)
    server_tokens off;                     # do not leak the Nginx version

    # ── Security headers (applied to every response) ─────────────────────────
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(self), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' https://cdn.tailwindcss.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' ws: wss: https://earthquake.usgs.gov; frame-src 'self' https://drive.google.com https://docs.google.com https://www.youtube.com https://www.youtube-nocookie.com https://player.vimeo.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    # Enable HSTS only once HTTPS is in place:
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Limit request body (uploads) to a sane size.
    client_max_body_size 50m;

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://backend:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://backend:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
    }
}


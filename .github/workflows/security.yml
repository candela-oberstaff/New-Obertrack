name: security

# Continuous security checks (audit long-term plan): dependency CVEs and static
# analysis for both the Go backend and the React frontend.
on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC

permissions:
  contents: read

jobs:
  backend:
    name: Go backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - name: go vet
        run: go vet ./...
      - name: govulncheck (known CVEs)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
      - name: gosec (static analysis)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./... || true   # report-only until findings are triaged

  frontend:
    name: React frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci || npm install
      - name: npm audit (high severity blocks; production deps only)
        # Audit only what ships to users. Dev tooling (e.g. the Vitest/Vite test
        # runner) is not deployed, so its advisories must not block releases.
        run: npm audit --omit=dev --audit-level=high
      - name: type-check & build
        run: npm run build
